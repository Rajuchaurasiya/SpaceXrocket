<h2 class="my-4">Payloads</h2>

<div *ngIf="loading" class="text-center my-4">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-2">Loading payloads...</p>
</div>

<div *ngIf="error" class="alert alert-danger text-center">
    {{ error }}
</div>

<div *ngIf="!loading && payloads.length" class="table-responsive">
    <table class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Type</th>
                <th>Orbit</th>
                <th>Mass (kg)</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let p of pagedPayloads">
                <td>{{ p.type }}</td>
                <td>{{ p.orbit }}</td>
                <td>{{ p.mass_kg || '-' }}</td>
            </tr>
        </tbody>
    </table>
</div>


<div *ngIf="!loading && !payloads.length && !error" class="text-center text-muted mt-3">
    No payloads found.
</div>

<!-- Pagination -->
<div *ngIf="!loading && payloads.length" class="d-flex justify-content-between align-items-center mt-2">
    <div class="text-muted">
        Showing {{ showStart }} - {{ showEnd }} of {{ payloads.length }}
    </div>
    <nav>
        <ul class="pagination mb-0">
            <li class="page-item" [class.disabled]="currentPage === 1">
                <button class="page-link" (click)="prevPage()" [attr.aria-disabled]="currentPage === 1">Previous</button>
            </li>
            <li class="page-item" *ngFor="let p of pages" [class.active]="currentPage === p">
                <button class="page-link" (click)="setPage(p)">{{ p }}</button>
            </li>
            <li class="page-item" [class.disabled]="currentPage === totalPages">
                <button class="page-link" (click)="nextPage()" [attr.aria-disabled]="currentPage === totalPages">Next</button>
            </li>
        </ul>
    </nav>
</div>
